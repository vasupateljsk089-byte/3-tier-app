version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSL: ${DB_SSL:-true}

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:4000
    ports:
      - "3000:80"
    depends_on:
      - backend
